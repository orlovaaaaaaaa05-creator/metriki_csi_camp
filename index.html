<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCamp - Оценка</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-pattern">
        <div class="dot-pattern top-left"></div>
        <div class="dot-pattern bottom-right"></div>
    </div>

    <div class="container">
        <header class="theme-header">
            <div class="header-content">
                <div class="header-text">
                    <h1>SKYCAMP</h1>
                    <p id="subtitle">Загрузка...</p>
                </div>
                <div class="character">
                    <img src="photo/kaifer.png" alt="Кайфер">
                </div>
            </div>
        </header>

        <main id="formCard" class="theme-card">
            <h2 class="question" id="questionText">Оцени урок</h2>
            
            <div class="rating-timeline">
                <div class="timeline-track">
                    <div class="timeline-line"></div>
                    <div class="timeline-progress" id="progressBar"></div>
                </div>
                <div class="timeline-track" id="ratingButtons"></div>
            </div>

            <form id="surveyForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Имя</label>
                        <input type="text" id="name" required placeholder="Как тебя зовут?">
                    </div>
                    <div class="form-group">
                        <label for="city">Город</label>
                        <select id="city" required>
                            <option value="" disabled selected>Выбери город</option>
                            <option value="Чебоксары">Чебоксары</option>
                            <option value="Астрахань">Астрахань</option>
                            <option value="Нижний Новгород">Нижний Новгород</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="comment">Комментарий</label>
                        <textarea id="comment" placeholder="Что запомнилось? (необязательно)"></textarea>
                    </div>
                </div>

                <button type="submit" class="theme-btn" id="submitBtn">ОТПРАВИТЬ</button>
                <div class="loader" id="loader" style="display:none;">
                    <div class="spinner"></div> Отправляем...
                </div>
            </form>
        </main>

        <div id="successCard" class="theme-card success" style="display:none;">
            <h2>Ты супер!</h2>
            <p>Твоя оценка сохранена.</p>
            <div class="meme-box">
                <div class="meme-badge"> МЕМ ДНЯ</div>
                <div class="meme-frame"><img id="memeImg" src="" alt="Meme"></div>
            </div>
            <button class="theme-btn secondary" onclick="location.reload()">ЕЩЁ РАЗ</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
